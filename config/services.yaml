services:
    _defaults:
        autowire: true
        autoconfigure: true

    PsychedCms\Search\:
        resource: '../src/'
        exclude:
            - '../src/Exception/'
            - '../src/PsychedCmsSearchBundle.php'

    PsychedCms\Search\Search\SearchServiceInterface:
        alias: PsychedCms\Search\Search\SearchService

    PsychedCms\Search\Search\AutocompleteServiceInterface:
        alias: PsychedCms\Search\Search\AutocompleteService

    PsychedCms\Search\Search\FacetServiceInterface:
        alias: PsychedCms\Search\Search\FacetService

    PsychedCms\Search\State\SearchOperationsResourceMetadataCollectionFactory:
        decorates: 'api_platform.metadata.resource.metadata_collection_factory'
        decoration_priority: -10
        arguments:
            $decorated: '@.inner'
